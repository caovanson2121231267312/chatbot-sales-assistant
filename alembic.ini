# alembic.ini
# Run: alembic upgrade head
#      alembic revision --autogenerate -m "description"

[alembic]
script_location = database/migrations
prepend_sys_path = .
version_path_separator = os

# URL is overridden by env.py (reads from .env)
sqlalchemy.url = mysql+mysqlconnector://root:@localhost:3306/ecommerce_chatbot?charset=utf8mb4

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
