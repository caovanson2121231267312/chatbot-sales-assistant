# ============================================================
# .github/workflows/ci-cd.yml
# CI/CD Pipeline: Test → Build → Push → Deploy
# ============================================================
# Secrets cần cấu hình trong GitHub repo Settings → Secrets:
#   DOCKER_HUB_USERNAME   - Docker Hub username
#   DOCKER_HUB_TOKEN      - Docker Hub access token
#   PROD_SERVER_HOST      - IP hoặc domain server production
#   PROD_SERVER_USER      - SSH user (vd: ubuntu, root)
#   PROD_SERVER_SSH_KEY   - Private SSH key (nội dung file id_rsa)
#   PROD_ENV_FILE         - Nội dung file .env.production
# ============================================================

name: CI/CD Rasa Chatbot

on:
  push:
    branches:
      - main
      - master
    tags:
      - "v*.*.*"
  pull_request:
    branches:
      - main
      - master

env:
  IMAGE_NAME: ${{ secrets.DOCKER_HUB_USERNAME }}/rasa-action-server
  DEPLOY_DIR: /opt/rasa-chatbot

jobs:
  # ── Job 1: Lint & Validate ──────────────────────────────
  validate:
    name: Validate Rasa Config
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install dependencies
        run: pip install rasa==3.6.0 rasa-sdk==3.6.0

      - name: Validate Rasa project
        run: rasa data validate --domain domain.yml --data data/

      - name: Check NLU data
        run: rasa data validate nlu --domain domain.yml --data data/

  # ── Job 2: Build & Push Docker image ───────────────────
  build:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'push'
    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
      image_version: ${{ steps.meta.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.prod
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

  # ── Job 3: Deploy lên Production ───────────────────────
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/v')
    environment:
      name: production
      url: http://${{ secrets.PROD_SERVER_HOST }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.PROD_SERVER_SSH_KEY }}

      - name: Add server to known_hosts
        run: |
          ssh-keyscan -H ${{ secrets.PROD_SERVER_HOST }} >> ~/.ssh/known_hosts

      - name: Copy project files to server
        run: |
          rsync -avz --delete \
            --exclude='.git' \
            --exclude='models/*.tar.gz' \
            --exclude='.env*' \
            --exclude='nginx/logs' \
            --exclude='__pycache__' \
            ./ ${{ secrets.PROD_SERVER_USER }}@${{ secrets.PROD_SERVER_HOST }}:${{ env.DEPLOY_DIR }}/

      - name: Write .env.production on server
        run: |
          echo "${{ secrets.PROD_ENV_FILE }}" | \
          ssh ${{ secrets.PROD_SERVER_USER }}@${{ secrets.PROD_SERVER_HOST }} \
            "cat > ${{ env.DEPLOY_DIR }}/.env.production"

      - name: Deploy with Docker Compose
        env:
          IMAGE_VERSION: ${{ needs.build.outputs.image_version }}
        run: |
          ssh ${{ secrets.PROD_SERVER_USER }}@${{ secrets.PROD_SERVER_HOST }} << 'ENDSSH'
            set -e
            cd ${{ env.DEPLOY_DIR }}

            # Pull image mới nhất
            docker-compose -f docker-compose.prod.yml --env-file .env.production pull action_server

            # Rolling restart: không downtime
            docker-compose -f docker-compose.prod.yml --env-file .env.production up -d \
              --remove-orphans \
              --no-build

            # Dọn image cũ
            docker image prune -f

            echo "Deploy thành công!"
          ENDSSH

      - name: Health check sau deploy
        run: |
          sleep 30
          curl --fail --retry 5 --retry-delay 10 \
            http://${{ secrets.PROD_SERVER_HOST }}/health || \
            (echo "Health check thất bại!" && exit 1)

      - name: Notify deploy status
        if: always()
        run: |
          STATUS="${{ job.status }}"
          echo "Deploy status: $STATUS"
          # Thêm webhook Slack/Telegram ở đây nếu cần
