<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trợ lý ảo E-Commerce - Shop Hỗ Trợ</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            /* Màu xanh TopCV-like */
            --primary-blue: #2563EB;
            --primary-blue-light: #3B82F6;
            --primary-blue-dark: #1D4ED8;
            --primary-blue-50: #EFF6FF;
            --primary-blue-100: #DBEAFE;

            /* Màu phụ */
            --success: #10B981;
            --warning: #F59E0B;
            --error: #EF4444;
            --gray-50: #F9FAFB;
            --gray-100: #F3F4F6;
            --gray-200: #E5E7EB;
            --gray-300: #D1D5DB;
            --gray-400: #9CA3AF;
            --gray-500: #6B7280;
            --gray-600: #4B5563;
            --gray-700: #374151;
            --gray-800: #1F2937;
            --gray-900: #111827;

            /* Shadows */
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
            --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1);
            --shadow-xl: 0 20px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1);

            /* Border radius */
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
            --radius-xl: 20px;
            --radius-full: 9999px;
        }

        body {
            font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #EFF6FF 0%, #DBEAFE 50%, #BFDBFE 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        /* Main Chat Container */
        .chat-widget {
            width: 100%;
            max-width: 420px;
            height: 90vh;
            max-height: 720px;
            background: white;
            border-radius: var(--radius-xl);
            box-shadow: var(--shadow-xl);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border: 1px solid var(--gray-200);
        }

        /* Header */
        .chat-header {
            background: linear-gradient(135deg, var(--primary-blue) 0%, var(--primary-blue-light) 100%);
            padding: 16px 20px;
            display: flex;
            align-items: center;
            gap: 14px;
            position: relative;
            z-index: 10;
        }

        .chat-header::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.1) 0%, transparent 100%);
            pointer-events: none;
        }

        .bot-avatar {
            width: 48px;
            height: 48px;
            border-radius: var(--radius-full);
            background: white;
            padding: 3px;
            box-shadow: var(--shadow-md);
            position: relative;
            flex-shrink: 0;
        }

        .bot-avatar img {
            width: 100%;
            height: 100%;
            border-radius: var(--radius-full);
            object-fit: cover;
        }

        .bot-avatar::after {
            content: '';
            position: absolute;
            bottom: 2px;
            right: 2px;
            width: 14px;
            height: 14px;
            background: var(--success);
            border: 3px solid white;
            border-radius: var(--radius-full);
        }

        .header-info {
            flex: 1;
            color: white;
            position: relative;
            z-index: 1;
        }

        .header-info h1 {
            font-size: 17px;
            font-weight: 700;
            margin-bottom: 2px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .header-info h1 .badge {
            background: rgba(255,255,255,0.2);
            padding: 2px 8px;
            border-radius: var(--radius-full);
            font-size: 11px;
            font-weight: 500;
        }

        .header-info p {
            font-size: 13px;
            opacity: 0.9;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .header-info p::before {
            content: '';
            width: 6px;
            height: 6px;
            background: #86EFAC;
            border-radius: var(--radius-full);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .header-actions {
            display: flex;
            gap: 8px;
        }

        .header-btn {
            width: 36px;
            height: 36px;
            border-radius: var(--radius-md);
            border: none;
            background: rgba(255,255,255,0.15);
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .header-btn:hover {
            background: rgba(255,255,255,0.25);
            transform: scale(1.05);
        }

        /* Chat Container */
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: var(--gray-50);
            scroll-behavior: smooth;
        }

        .chat-container::-webkit-scrollbar {
            width: 6px;
        }

        .chat-container::-webkit-scrollbar-track {
            background: transparent;
        }

        .chat-container::-webkit-scrollbar-thumb {
            background: var(--gray-300);
            border-radius: var(--radius-full);
        }

        /* Messages */
        .message {
            display: flex;
            margin-bottom: 16px;
            animation: messageIn 0.3s ease-out;
        }

        @keyframes messageIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.bot {
            align-items: flex-start;
        }

        .message.user {
            flex-direction: row-reverse;
        }

        .message-avatar {
            width: 32px;
            height: 32px;
            border-radius: var(--radius-full);
            background: linear-gradient(135deg, var(--primary-blue) 0%, var(--primary-blue-light) 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 14px;
            flex-shrink: 0;
            margin-right: 10px;
        }

        .message.user .message-avatar {
            background: var(--gray-200);
            color: var(--gray-600);
            margin-right: 0;
            margin-left: 10px;
        }

        .message-bubble {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: var(--radius-lg);
            font-size: 14.5px;
            line-height: 1.5;
            word-wrap: break-word;
            white-space: pre-wrap;
            position: relative;
        }

        .message.bot .message-bubble {
            background: white;
            color: var(--gray-800);
            border-bottom-left-radius: 4px;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--gray-100);
        }

        .message.user .message-bubble {
            background: linear-gradient(135deg, var(--primary-blue) 0%, var(--primary-blue-light) 100%);
            color: white;
            border-bottom-right-radius: 4px;
            box-shadow: var(--shadow-md);
        }

        .message-time {
            font-size: 11px;
            opacity: 0.7;
            margin-top: 4px;
            text-align: right;
        }

        .message.bot .message-time {
            color: var(--gray-400);
        }

        /* Quick Reply Buttons */
        .quick-replies {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 8px;
        }

        .quick-reply-btn {
            padding: 8px 14px;
            background: var(--primary-blue-50);
            border: 1px solid var(--primary-blue-100);
            color: var(--primary-blue);
            border-radius: var(--radius-full);
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
        }

        .quick-reply-btn:hover {
            background: var(--primary-blue);
            color: white;
            border-color: var(--primary-blue);
            transform: translateY(-1px);
        }

        /* Typing Indicator */
        .typing-indicator {
            display: none;
            padding: 12px 16px;
            background: white;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--gray-100);
            margin-bottom: 16px;
            width: fit-content;
        }

        .typing-indicator.show {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .typing-dot {
            width: 8px;
            height: 8px;
            background: var(--primary-blue);
            border-radius: var(--radius-full);
            animation: typingBounce 1.4s infinite ease-in-out both;
        }

        .typing-dot:nth-child(1) { animation-delay: -0.32s; }
        .typing-dot:nth-child(2) { animation-delay: -0.16s; }
        .typing-dot:nth-child(3) { animation-delay: 0s; }

        @keyframes typingBounce {
            0%, 80%, 100% { transform: scale(0.6); opacity: 0.5; }
            40% { transform: scale(1); opacity: 1; }
        }

        /* Welcome Message */
        .welcome-section {
            text-align: center;
            padding: 30px 20px;
        }

        .welcome-icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, var(--primary-blue-50) 0%, var(--primary-blue-100) 100%);
            border-radius: var(--radius-full);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            font-size: 36px;
            animation: welcomePulse 2s infinite;
        }

        @keyframes welcomePulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .welcome-section h2 {
            color: var(--gray-800);
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .welcome-section p {
            color: var(--gray-500);
            font-size: 14px;
            margin-bottom: 20px;
        }

        .welcome-features {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            text-align: left;
        }

        .welcome-feature {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px;
            background: white;
            border-radius: var(--radius-md);
            border: 1px solid var(--gray-100);
            cursor: pointer;
            transition: all 0.2s;
        }

        .welcome-feature:hover {
            border-color: var(--primary-blue);
            background: var(--primary-blue-50);
            transform: translateY(-2px);
        }

        .welcome-feature-icon {
            width: 36px;
            height: 36px;
            background: var(--primary-blue-50);
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            flex-shrink: 0;
        }

        .welcome-feature-text {
            flex: 1;
        }

        .welcome-feature-text strong {
            display: block;
            font-size: 13px;
            color: var(--gray-800);
            margin-bottom: 2px;
        }

        .welcome-feature-text span {
            font-size: 11px;
            color: var(--gray-500);
        }

        /* Input Area */
        .input-area {
            padding: 16px 20px;
            background: white;
            border-top: 1px solid var(--gray-100);
        }

        .input-wrapper {
            display: flex;
            align-items: flex-end;
            gap: 10px;
            background: var(--gray-50);
            border-radius: var(--radius-xl);
            padding: 8px 8px 8px 16px;
            border: 2px solid var(--gray-200);
            transition: all 0.2s;
        }

        .input-wrapper:focus-within {
            border-color: var(--primary-blue);
            background: white;
            box-shadow: 0 0 0 3px var(--primary-blue-50);
        }

        .input-wrapper input {
            flex: 1;
            border: none;
            background: transparent;
            font-size: 15px;
            font-family: inherit;
            color: var(--gray-800);
            outline: none;
            resize: none;
            max-height: 100px;
            min-height: 24px;
            line-height: 1.5;
        }

        .input-wrapper input::placeholder {
            color: var(--gray-400);
        }

        .send-btn {
            width: 42px;
            height: 42px;
            border-radius: var(--radius-full);
            border: none;
            background: linear-gradient(135deg, var(--primary-blue) 0%, var(--primary-blue-light) 100%);
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            flex-shrink: 0;
        }

        .send-btn:hover {
            transform: scale(1.05);
            box-shadow: var(--shadow-md);
        }

        .send-btn:active {
            transform: scale(0.95);
        }

        .send-btn:disabled {
            background: var(--gray-300);
            cursor: not-allowed;
            transform: none;
        }

        .input-actions {
            display: flex;
            gap: 6px;
            margin-bottom: 8px;
        }

        .input-action-btn {
            padding: 4px 10px;
            background: transparent;
            border: 1px solid var(--gray-200);
            border-radius: var(--radius-full);
            font-size: 12px;
            color: var(--gray-500);
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
        }

        .input-action-btn:hover {
            background: var(--primary-blue-50);
            border-color: var(--primary-blue);
            color: var(--primary-blue);
        }

        /* Online indicator */
        .online-dot {
            width: 8px;
            height: 8px;
            background: #86EFAC;
            border-radius: var(--radius-full);
            display: inline-block;
            margin-right: 4px;
            animation: pulse 2s infinite;
        }

        /* Responsive */
        @media (max-width: 480px) {
            body {
                padding: 0;
            }

            .chat-widget {
                max-width: 100%;
                height: 100vh;
                max-height: 100vh;
                border-radius: 0;
            }

            .welcome-features {
                grid-template-columns: 1fr;
            }

            .message-bubble {
                max-width: 85%;
            }
        }

        /* Product Card in Message */
        .product-card {
            background: white;
            border-radius: var(--radius-md);
            overflow: hidden;
            margin-top: 10px;
            border: 1px solid var(--gray-200);
            max-width: 280px;
        }

        .product-card-image {
            width: 100%;
            height: 140px;
            background: var(--gray-100);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
        }

        .product-card-info {
            padding: 12px;
        }

        .product-card-name {
            font-weight: 600;
            font-size: 14px;
            color: var(--gray-800);
            margin-bottom: 4px;
        }

        .product-card-price {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .product-card-price-current {
            font-weight: 700;
            color: var(--primary-blue);
            font-size: 16px;
        }

        .product-card-price-original {
            font-size: 13px;
            color: var(--gray-400);
            text-decoration: line-through;
        }

        .product-card-btn {
            width: 100%;
            margin-top: 10px;
            padding: 8px;
            background: var(--primary-blue);
            color: white;
            border: none;
            border-radius: var(--radius-sm);
            font-weight: 600;
            cursor: pointer;
            font-size: 13px;
            transition: background 0.2s;
        }

        .product-card-btn:hover {
            background: var(--primary-blue-dark);
        }
    </style>
</head>

        <!-- Header -->
        <div class="chat-header">
            <div class="bot-avatar">
                <img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0%25' y1='0%25' x2='100%25' y2='100%25'%3E%3Cstop offset='0%25' style='stop-color:%232563EB'/%3E%3Cstop offset='100%25' style='stop-color:%233B82F6'/%3E%3C/linearGradient%3E%3C/defs%3E%3Ccircle cx='50' cy='50' r='45' fill='url(%23g)'/%3E%3Ccircle cx='35' cy='40' r='8' fill='white'/%3E%3Ccircle cx='65' cy='40' r='8' fill='white'/%3E%3Cellipse cx='50' cy='60' rx='15' ry='10' fill='white'/%3E%3C/svg%3E" alt="Bot">
            </div>
            <div class="header-info">
                <h1>
                    🎯 Shop Assistant
                    <span class="badge">BOT</span>
                </h1>
                <p><span class="online-dot"></span>Trực tuyến 24/7</p>
            </div>
            <div class="header-actions">
                <button class="header-btn" title="Lịch sử chat" onclick="toggleHistory()">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="10"/>
                        <polyline points="12,6 12,12 16,14"/>
                    </svg>
                </button>
                <button class="header-btn" title="Cài đặt" onclick="toggleSettings()">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="3"/>
                        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/>
                    </svg>
                </button>
            </div>
        </div>

        <!-- Chat Container -->
        <div class="chat-container" id="chatContainer">
            <!-- Welcome Section -->
            <div class="welcome-section" id="welcomeSection">
                <div class="welcome-icon">👋</div>
                <h2>Xin chào! 👋</h2>
                <p>Tôi là trợ lý mua sắm của Shop. Hãy để tôi giúp bạn nhé!</p>

                <div class="welcome-features">
                    <div class="welcome-feature" onclick="sendQuickMessage('Tìm sản phẩm')">
                        <div class="welcome-feature-icon">📱</div>
                        <div class="welcome-feature-text">
                            <strong>Tìm sản phẩm</strong>
                            <span>iPhone, Laptop...</span>
                        </div>
                    </div>
                    <div class="welcome-feature" onclick="sendQuickMessage('Mã giảm giá')">
                        <div class="welcome-feature-icon">🎁</div>
                        <div class="welcome-feature-text">
                            <strong>Khuyến mãi</strong>
                            <span>Xem ưu đãi</span>
                        </div>
                    </div>
                    <div class="welcome-feature" onclick="sendQuickMessage('Kiểm tra đơn hàng')">
                        <div class="welcome-feature-icon">📦</div>
                        <div class="welcome-feature-text">
                            <strong>Đơn hàng</strong>
                            <span>Tra cứu vận chuyển</span>
                        </div>
                    </div>
                    <div class="welcome-feature" onclick="sendQuickMessage('Tư vấn sản phẩm')">
                        <div class="welcome-feature-icon">💡</div>
                        <div class="welcome-feature-text">
                            <strong>Tư vấn</strong>
                            <span>Gợi ý sản phẩm</span>
                        </div>

            <!-- Typing Indicator -->
            <div class="typing-indicator" id="typingIndicator">
                <div class="typing-dot"></div>
                <div class="typing-dot"></div>
                <div class="typing-dot"></div>
            </div>
        </div>

        <!-- Input Area -->
        <div class="input-area">
            <div class="input-actions">
                <button class="input-action-btn" onclick="sendQuickMessage('Cần hỗ trợ')">💬 Hỗ trợ</button>
                <button class="input-action-btn" onclick="sendQuickMessage('Chính sách giao hàng')">🚚 Giao hàng</button>
                <button class="input-action-btn" onclick="sendQuickMessage('Chính sách đổi trả')">🔄 Đổi trả</button>
            </div>
            <div class="input-wrapper">
                <input
                    type="text"
                    id="userInput"
                    placeholder="Nhập tin nhắn..."
                    autocomplete="off"
                >
                <button class="send-btn" id="sendButton" onclick="sendMessage()">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="22" y1="2" x2="11" y2="13"/>
                        <polygon points="22,2 15,22 11,13 2,9"/>
                    </svg>
                </button>
            </div>
        </div>
    </div>

    <script>
        const RASA_SERVER_URL = 'http://localhost:5005/webhooks/rest/webhook';
        let conversationStarted = false;
        let messageCount = 0;

        function getCurrentTime() {
            const now = new Date();
            return now.toLocaleTimeString('vi-VN', { hour: '2-digit', minute: '2-digit' });
        }

        function addMessage(text, isUser, quickReplies = null) {
            const chatContainer = document.getElementById('chatContainer');
            const welcomeSection = document.getElementById('welcomeSection');
            const typingIndicator = document.getElementById('typingIndicator');

            // Hide welcome section when first message is sent
            if (!conversationStarted && welcomeSection) {
                welcomeSection.style.display = 'none';
                conversationStarted = true;
            }

            // Create message element
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${isUser ? 'user' : 'bot'}`;

            const avatar = document.createElement('div');
            avatar.className = 'message-avatar';
            avatar.innerHTML = isUser ? '👤' : '🎯';

            const bubble = document.createElement('div');
            bubble.className = 'message-bubble';

            // Parse text for quick replies or product cards
            if (quickReplies && quickReplies.length > 0) {
                bubble.innerHTML = `<div>${text}</div><div class="quick-replies">${quickReplies.map(btn =>
                    `<button class="quick-reply-btn" onclick="sendQuickMessage('${btn}')">${btn}</button>`
                ).join('')}</div>`;
            } else {
                bubble.innerHTML = text;
            }

            const time = document.createElement('div');
            time.className = 'message-time';
            time.textContent = getCurrentTime();
            bubble.appendChild(time);

            messageDiv.appendChild(avatar);
            messageDiv.appendChild(bubble);

            // Insert before typing indicator
            chatContainer.insertBefore(messageDiv, typingIndicator);

            // Scroll to bottom
            chatContainer.scrollTop = chatContainer.scrollHeight;

            messageCount++;
        }

        function showTypingIndicator() {
            const typingIndicator = document.getElementById('typingIndicator');
            typingIndicator.classList.add('show');
            const chatContainer = document.getElementById('chatContainer');
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function hideTypingIndicator() {
            const typingIndicator = document.getElementById('typingIndicator');
            typingIndicator.classList.remove('show');
        }

        async function sendMessage() {
            const input = document.getElementById('userInput');
            const sendButton = document.getElementById('sendButton');
            const message = input.value.trim();

            if (!message) return;

            // Disable input while sending
            input.disabled = true;
            sendButton.disabled = true;

            addMessage(message, true);
            input.value = '';

            showTypingIndicator();

            try {
                const response = await fetch(RASA_SERVER_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        sender: 'user_' + messageCount,
                        message: message
                    })
                });

                hideTypingIndicator();

                if (!response.ok) {
                    throw new Error('Không thể kết nối đến server');
                }

                const data = await response.json();

                if (data && data.length > 0) {
                    data.forEach(msg => {
                        if (msg.text) {
                            // Check for quick replies in response
                            const quickReplies = msg.quick_replies || null;
                            addMessage(msg.text, false, quickReplies);
                        }
                        if (msg.image) {
                            // Handle image messages
                            addMessage(`<img src="${msg.image}" style="max-width: 200px; border-radius: 8px; margin-top: 8px;">`, false);
                        }
                    });
                } else {
                    addMessage('Xin lỗi, tôi chưa hiểu câu hỏi của bạn. Bạn có thể hỏi rõ hơn được không?', false);
                }
            } catch (error) {
                hideTypingIndicator();
                console.error('Error:', error);
                addMessage('⚠️ Đã xảy ra lỗi kết nối! Vui lòng thử lại sau hoặc liên hệ hotline để được hỗ trợ.', false);
            } finally {
                // Re-enable input
                input.disabled = false;
                sendButton.disabled = false;
                input.focus();
            }
        }

        function sendQuickMessage(message) {
            document.getElementById('userInput').value = message;
            sendMessage();
        }

        function handleKeyPress(event) {
            if (event.key === 'Enter' && !event.shiftKey) {
                event.preventDefault();
                sendMessage();
            }
        }

        function toggleHistory() {
            alert('Tính năng đang được phát triển!');
        }

        function toggleSettings() {
            alert('Tính năng đang được phát triển!');
        }

        // Initialize
        document.getElementById('userInput').addEventListener('keypress', handleKeyPress);
        document.getElementById('userInput').focus();
    </script>
</body>
</html>
