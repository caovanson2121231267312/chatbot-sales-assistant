# ============================================================
# nginx/nginx.prod.conf - Production Nginx Config
# ============================================================
# Hỗ trợ:
#   - Reverse proxy đến Rasa API (REST + Socket.IO)
#   - Serve widget.html cho các web tích hợp
#   - Rate limiting chống spam
#   - CORS headers
#   - Gzip compression
#   - SSL-ready (uncomment block HTTPS bên dưới)
# ============================================================

user  nginx;
worker_processes  auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging ──────────────────────────────────────────────
    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';
    access_log  /var/log/nginx/access.log  main;

    # ── Performance ───────────────────────────────────────────
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  65;
    client_max_body_size 10m;

    # ── Gzip ─────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript;

    # ── Rate Limiting ─────────────────────────────────────────
    # 30 requests/phút mỗi IP cho Rasa API
    limit_req_zone $binary_remote_addr zone=rasa_api:10m rate=30r/m;
    # 10 requests/giây cho widget static files
    limit_req_zone $binary_remote_addr zone=static:10m rate=10r/s;

    # ── Upstream ──────────────────────────────────────────────
    upstream rasa_backend {
        server rasa:5005;
        keepalive 32;
    }

    include /etc/nginx/conf.d/*.conf;
}
