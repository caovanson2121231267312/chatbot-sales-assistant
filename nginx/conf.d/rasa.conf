# ============================================================
# nginx/conf.d/rasa.conf
# Virtual host cho Rasa chatbot API + Widget
# ============================================================
# Thay YOUR_DOMAIN bằng domain thật (vd: chatbot.myshop.vn)
# ============================================================

# ── HTTP → HTTPS redirect (bật khi có SSL) ───────────────
# server {
#     listen 80;
#     server_name YOUR_DOMAIN;
#     return 301 https://$host$request_uri;
# }

# ── Main server block ─────────────────────────────────────
server {
    listen 80;
    # listen 443 ssl http2;          # Bật khi có SSL cert
    server_name _;                   # Thay bằng YOUR_DOMAIN khi production

    # ── SSL (uncomment khi có cert) ───────────────────────
    # ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    # ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    # ssl_protocols       TLSv1.2 TLSv1.3;
    # ssl_ciphers         HIGH:!aNULL:!MD5;
    # ssl_session_cache   shared:SSL:10m;
    # ssl_session_timeout 10m;

    # ── Security headers ──────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ── CORS helper ───────────────────────────────────────
    # Cho phép các website khác gọi API chatbot
    # Thay * bằng domain cụ thể khi production:
    # add_header Access-Control-Allow-Origin "https://myshop.vn" always;
    add_header Access-Control-Allow-Origin "*" always;
    add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;

    # Preflight OPTIONS
    if ($request_method = OPTIONS) {
        return 204;
    }

    # ── Rasa REST API ─────────────────────────────────────
    # Endpoint: POST /webhooks/rest/webhook
    # Dùng cho widget.html và các web tích hợp
    location /webhooks/ {
        limit_req zone=rasa_api burst=10 nodelay;

        proxy_pass         http://rasa_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # ── Rasa Socket.IO (real-time) ────────────────────────
    location /socket.io/ {
        proxy_pass         http://rasa_backend;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_read_timeout 3600s;   # WebSocket cần timeout dài
        proxy_send_timeout 3600s;
    }

    # ── Rasa Health check (public) ────────────────────────
    location = /health {
        proxy_pass http://rasa_backend/;
        access_log off;
    }

    # ── Widget embed (cho các web tích hợp) ──────────────
    # Truy cập: http://YOUR_DOMAIN/widget/widget.html
    location /widget/ {
        limit_req zone=static burst=20 nodelay;
        alias /usr/share/nginx/html/widget/;
        try_files $uri $uri/ =404;

        # Cache static assets
        location ~* \.(js|css|png|jpg|gif|ico|svg)$ {
            expires 7d;
            add_header Cache-Control "public, immutable";
        }
    }

    # ── Redirect root → widget ────────────────────────────
    location = / {
        return 301 /widget/widget.html;
    }

    # ── Block truy cập trực tiếp vào Rasa internal ───────
    location ~ ^/(api|model|domain|stories|rules|nlu) {
        return 403;
    }
}
