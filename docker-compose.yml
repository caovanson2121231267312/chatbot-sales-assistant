# Chạy Rasa bot với Docker - MySQL kết nối bên ngoài (host hoặc server khác)
# Cấu hình DB: tạo file .env từ .env.example (DB_HOST, DB_PORT, DB_NAME, DB_USER, DB_PASSWORD)
# Nếu MySQL chạy trên máy host: DB_HOST=host.docker.internal (Windows/Mac) hoặc IP máy host (Linux)

version: "3.8"

services:
  duckling:
    image: rasa/duckling:latest
    ports:
      - "8888:8000"
    restart: unless-stopped

  action_server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rasa_action_server
    ports:
      - "5055:5055"
    env_file:
      - .env
    environment:
      - DB_HOST=${DB_HOST:-localhost}
      - DB_PORT=${DB_PORT:-3306}
      - DB_NAME=${DB_NAME:-ecommerce_chatbot}
      - DB_USER=${DB_USER:-root}
      - DB_PASSWORD=${DB_PASSWORD}
    volumes:
      - ./actions:/app/actions
      - ./database:/app/database
    extra_hosts:
      # Cho phép container gọi MySQL trên máy host (Windows/Mac)
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; s=socket.socket(); s.settimeout(2); s.connect(('localhost',5055)); s.close()"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s

  rasa:
    image: rasa/rasa:3.6.0
    container_name: rasa_server
    ports:
      - "5005:5005"
    volumes:
      - ./:/app
      # Trong Docker, Rasa gọi action server qua tên service "action_server"
      - ./endpoints.docker.yml:/app/endpoints.yml
    # CORS: "*" cho phép tất cả (test). Production: thay bằng domain cụ thể, ví dụ:
    # --cors "https://your-website.com,https://www.your-website.com"
    command: run --enable-api --cors "*" --debug
    env_file:
      - .env
    environment:
      - RASA_SERVER_PORT=5005
    depends_on:
      action_server:
        condition: service_healthy
    restart: unless-stopped

  web:
    image: nginx:alpine
    container_name: rasa_webchat
    ports:
      - "8080:80"
    volumes:
      - ./rasa-webchat:/usr/share/nginx/html:ro
    restart: unless-stopped
